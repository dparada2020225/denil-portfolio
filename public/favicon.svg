<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo oscuro con esquinas redondeadas -->
  <rect width="32" height="32" rx="7" fill="#07090f"/>

  <!-- Corchete izquierdo -->
  <path d="M8 8 L4.5 16 L8 24" stroke="#4a8fd4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Corchete derecho -->
  <path d="M24 8 L27.5 16 L24 24" stroke="#4a8fd4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Iniciales "dp" en monospace -->
  <text
    x="16" y="20.5"
    font-family="monospace"
    font-size="11"
    font-weight="700"
    fill="#e8edf5"
    text-anchor="middle"
    letter-spacing="-0.5"
  >dp</text>

  <!-- Punto azul acento (como el punto del logo en el navbar) -->
  <circle cx="24.5" cy="23.5" r="1.8" fill="#4a8fd4"/>
</svg>